name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: just sync

      - name: Install UI dependencies
        run: just ui-install

      - name: Run type checks
        run: just type-check

      - name: Run linter
        run: just lint-check

      - name: Run formatter
        run: just format-check

      - name: Run UI type checks
        run: just ui-type-check

      - name: Run UI linter
        run: just ui-lint-check

      - name: Run UI formatter
        run: just ui-format-check

      - name: Run tests
        run: just test

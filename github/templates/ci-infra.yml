name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read tool versions
        id: versions
        run: |
          echo "terraform=$(grep '^terraform ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "tflint=v$(grep '^tflint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "shellcheck=v$(grep '^shellcheck ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "shfmt=$(grep '^shfmt ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "just=$(grep '^just ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "ansible-lint=$(grep '^ansible-lint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Install just
        uses: extractions/setup-just@v4
        with:
          just-version: ${{ steps.versions.outputs.just }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ steps.versions.outputs.terraform }}
          terraform_wrapper: false

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: ${{ steps.versions.outputs.tflint }}

      - name: Install shellcheck
        run: |
          VERSION=${{ steps.versions.outputs.shellcheck }}
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz" | tar xJ
          sudo mv "shellcheck-${VERSION}/shellcheck" /usr/local/bin/

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v3
        with:
          shfmt-version: ${{ steps.versions.outputs.shfmt }}

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install PSScriptAnalyzer
        shell: pwsh
        # renovate: datasource=github-releases depName=PowerShell/PSScriptAnalyzer
        run: Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser

      - name: Install ansible-lint
        run: pip install ansible-lint==${{ steps.versions.outputs.ansible-lint }}

      - name: Initialize TFLint
        run: tflint --init --chdir=terraform

      - name: Run checks
        run: just ci

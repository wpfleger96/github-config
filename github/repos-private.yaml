apiVersion: gh-infra/v1
kind: RepositorySet
metadata:
  owner: wpfleger96

defaults:
  reconcile:
    labels: additive
  spec:
    visibility: private
    archived: false
    features:
      issues: true
      projects: true
      wiki: false
      discussions: false
      pull_requests: true
    merge_strategy:
      allow_merge_commit: true
      allow_squash_merge: true
      allow_rebase_merge: true
      auto_delete_head_branches: true
      squash_merge_commit_title: COMMIT_OR_PR_TITLE
      squash_merge_commit_message: COMMIT_MESSAGES
      merge_commit_title: MERGE_MESSAGE
      merge_commit_message: PR_TITLE
    release_immutability: false
    security:
      vulnerability_alerts: true
      automated_security_fixes: true
      private_vulnerability_reporting: false
    actions:
      enabled: true
      allowed_actions: all
      sha_pinning_required: false
      workflow_permissions: read
      can_approve_pull_requests: true

repositories:
- name: shell-configs
  spec:
    actions:
      workflow_permissions: write
    variables:
    - name: RELEASE_APP_ID
      value: "3648544"
    secrets:
    - name: RELEASE_APP_PRIVATE_KEY
      value: "${RELEASE_APP_PRIVATE_KEY}"
- name: recall
  spec:
    description: "Recall is a GitHub-backed markdown wiki exposed to agents via MCP server"
- name: SNORE
  spec:
    description: ""
- name: homelabconfigs
  spec:
    description: ""

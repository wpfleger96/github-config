apiVersion: gh-infra/v1
kind: RepositorySet
metadata:
  owner: wpfleger96

defaults:
  reconcile:
    labels: additive
  spec:
    visibility: private
    archived: false
    features:
      issues: true
      projects: true
      wiki: false
      discussions: false
      pull_requests: true
    merge_strategy:
      allow_merge_commit: false
      allow_squash_merge: true
      allow_rebase_merge: true
      auto_delete_head_branches: true
      squash_merge_commit_title: PR_TITLE
      squash_merge_commit_message: PR_BODY
      merge_commit_title: MERGE_MESSAGE
      merge_commit_message: PR_TITLE
    release_immutability: false
    security:
      vulnerability_alerts: true
      automated_security_fixes: false
      private_vulnerability_reporting: false
    actions:
      enabled: true
      allowed_actions: all
      sha_pinning_required: false
      workflow_permissions: read
      can_approve_pull_requests: true

repositories:
- name: shell-configs
  spec:
    description: "Declarative dev environment manager — shell configs, packages, VS Code/Cursor settings and extensions, git, GPG signing, gh CLI extensions, and iTerm2 profiles"
    topics:
    - python
    - dotfiles
    - shell
    - cli
    actions:
      workflow_permissions: write
    variables:
    - name: RELEASE_APP_ID
      value: "3648544"
    - name: RELEASE_APP_CLIENT_ID
      value: "Iv23lidipoTqvoMln1Di"
    secrets:
    - name: RELEASE_APP_PRIVATE_KEY
      value: "${RELEASE_APP_PRIVATE_KEY}"
- name: recall
  spec:
    description: "Recall is a GitHub-backed markdown wiki exposed to agents via MCP server"
    topics:
    - python
    - mcp
    - knowledge-base
    - markdown
- name: homelabconfigs
  spec:
    description: "Homelab infrastructure configuration — Terraform, Ansible, and Raspberry Pi"
    topics:
    - homelab
    - terraform
    - ansible
    - raspberry-pi
- name: syncify
  spec:
    description: "Self-hosted music library sync — Python backend, React frontend, Docker Compose"
    topics:
    - python
    - music
    - self-hosted
    - docker
- name: meowdb
  spec:
    topics:
    - python

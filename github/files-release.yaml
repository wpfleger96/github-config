apiVersion: gh-infra/v1
kind: FileSet
metadata:
  owner: wpfleger96

spec:
  repositories:
    - name: ai-agent-rules
      overrides:
        - path: release-please-config.json
          vars:
            package_name: ai-agent-rules
    - name: claude-code-status-line
      overrides:
        - path: release-please-config.json
          vars:
            package_name: claude-code-statusline
    - name: pagerduty-mcp-server
      overrides:
        - path: release-please-config.json
          vars:
            package_name: pagerduty_mcp_server
    - name: shell-configs
      overrides:
        - path: release-please-config.json
          vars:
            package_name: shell-configs

  files:
    - path: .github/workflows/release.yml
      source: ./templates/release.yml
    - path: release-please-config.json
      source: ./templates/release-please-config.json

  via: push
  commit_message: "ci: sync release workflow"

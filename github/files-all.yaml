apiVersion: gh-infra/v1
kind: FileSet
metadata:
  owner: wpfleger96

spec:
  repositories:
    - ai-agent-rules
    - claude-code-status-line
    - pagerduty-mcp-server
    - JamBot
    - name: recall
      overrides:
        - path: .github/workflows/ci.yml
          vars:
            git_identity: "true"
    - SNORE
    - name: shell-configs
      overrides:
        - path: .github/workflows/ci.yml
          vars:
            shell: "true"
    - name: homelabconfigs
      overrides:
        - path: .github/workflows/ci.yml
          source: ./templates/ci-infra.yml

  files:
    - path: .github/workflows/ci.yml
      source: ./templates/ci-python.yml
    - path: renovate.json
      source: ./templates/renovate.json
    - path: .github/workflows/auto-approve.yml
      source: ./templates/auto-approve.yml

  via: push
  commit_message: "ci: sync shared files"

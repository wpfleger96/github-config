apiVersion: gh-infra/v1
kind: RepositorySet
metadata:
  owner: wpfleger96

defaults:
  reconcile:
    labels: additive
  spec:
    visibility: public
    archived: false
    features:
      issues: true
      projects: true
      wiki: false
      discussions: false
      pull_requests: true
    merge_strategy:
      allow_merge_commit: true
      allow_squash_merge: true
      allow_rebase_merge: true
      allow_auto_merge: true
      auto_delete_head_branches: true
      squash_merge_commit_title: COMMIT_OR_PR_TITLE
      squash_merge_commit_message: COMMIT_MESSAGES
      merge_commit_title: MERGE_MESSAGE
      merge_commit_message: PR_TITLE
    release_immutability: false
    security:
      vulnerability_alerts: true
      automated_security_fixes: true
      private_vulnerability_reporting: true
    rulesets:
    - name: main
      target: branch
      enforcement: active
      bypass_actors:
      - role: admin
        bypass_mode: always
      - app: id:3648544
        bypass_mode: always
      conditions:
        ref_name:
          include:
          - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: true
          required_review_thread_resolution: true
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
          - context: checks
            app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
    variables:
    - name: RELEASE_APP_ID
      value: "3648544"
    secrets:
    - name: RELEASE_APP_PRIVATE_KEY
      value: "${RELEASE_APP_PRIVATE_KEY}"
    actions:
      enabled: true
      allowed_actions: all
      sha_pinning_required: false
      workflow_permissions: write
      can_approve_pull_requests: true
      fork_pr_approval: first_time_contributors

repositories:
- name: ai-agent-rules
  spec:
    description: "Manage configs for Claude Code, Codex, Gemini CLI, Goose, and Amp from one repo — symlinks, merge pipeline, profile inheritance, cross-machine sync"
    topics:
    - python
    - ai
    - llm
    - claude-code
    - coding-agents
- name: claude-code-status-line
  spec:
    description: "Real-time status bar for Claude Code showing model, context usage, session cost, git state, and token counts via the native status line hook"
    topics:
    - python
    - claude-code
    - cli
    - status-line
- name: pagerduty-mcp-server
  spec:
    description: "MCP server exposing PagerDuty incidents, services, schedules, and on-calls to AI agents — read, acknowledge, resolve, with OAuth and API key auth"
    topics:
    - python
    - mcp
    - pagerduty
    - llm
- name: github-config
  spec:
    description: "Declarative GitHub repo configuration management (gh-infra + Renovate)"
    topics:
    - github
    - gitops
    - renovate
    - gh-infra

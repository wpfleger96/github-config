apiVersion: gh-infra/v1
kind: RepositorySet
metadata:
  owner: wpfleger96

defaults:
  reconcile:
    labels: additive
  spec:
    visibility: public
    archived: false
    features:
      issues: true
      projects: true
      wiki: false
      discussions: false
      pull_requests: true
    merge_strategy:
      allow_merge_commit: false
      allow_squash_merge: true
      allow_rebase_merge: false
      allow_auto_merge: true
      auto_delete_head_branches: true
      squash_merge_commit_title: PR_TITLE
      squash_merge_commit_message: PR_BODY
      merge_commit_title: MERGE_MESSAGE
      merge_commit_message: PR_TITLE
    release_immutability: false
    security:
      vulnerability_alerts: true
      automated_security_fixes: false
      private_vulnerability_reporting: true
    rulesets:
    - name: main
      target: branch
      enforcement: active
      bypass_actors:
      - role: admin
        bypass_mode: always
      - app: id:3648544
        bypass_mode: always
      conditions:
        ref_name:
          include:
          - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: true
          required_review_thread_resolution: true
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
          - context: checks
            app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
    variables:
    - name: RELEASE_APP_ID
      value: "3648544"
    - name: RELEASE_APP_CLIENT_ID
      value: "Iv23lidipoTqvoMln1Di"
    secrets:
    - name: RELEASE_APP_PRIVATE_KEY
      value: "${RELEASE_APP_PRIVATE_KEY}"
    actions:
      enabled: true
      allowed_actions: all
      sha_pinning_required: false
      workflow_permissions: write
      can_approve_pull_requests: true
      fork_pr_approval: first_time_contributors

repositories:
- name: ai-agent-rules
  spec:
    description: "Manage configs for Claude Code, Codex, Gemini CLI, Goose, and Amp from one repo — symlinks, merge pipeline, profile inheritance, cross-machine sync"
    topics:
    - python
    - ai
    - llm
    - claude-code
    - coding-agents
    # ai-agent-rules has real e2e tests and opts into the e2e CI job, so require
    # the e2e context in addition to the default checks context.
    rulesets:
    - name: main
      target: branch
      enforcement: active
      bypass_actors:
      - role: admin
        bypass_mode: always
      - app: id:3648544
        bypass_mode: always
      conditions:
        ref_name:
          include:
          - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: true
          required_review_thread_resolution: true
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
          - context: checks
            app: github-actions
          - context: e2e
            app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
- name: claude-code-status-line
  spec:
    description: "Real-time status bar for Claude Code showing model, context usage, session cost, git state, and token counts via the native status line hook"
    topics:
    - python
    - claude-code
    - cli
    - status-line
- name: pagerduty-mcp-server
  spec:
    description: "MCP server exposing PagerDuty incidents, services, schedules, and on-calls to AI agents — read, acknowledge, resolve, with OAuth and API key auth"
    topics:
    - python
    - mcp
    - pagerduty
    - llm
- name: github-config
  spec:
    description: "Declarative GitHub repo configuration management (gh-infra + Renovate)"
    topics:
    - github
    - gitops
    - renovate
    - gh-infra
    # github-config self-manages its CI (Go-based gh-infra validate/plan). It
    # only emits a `checks` job — override the default ruleset to drop the `e2e`
    # context that github-config's CI never reports.
    rulesets:
    - name: main
      target: branch
      enforcement: active
      bypass_actors:
      - role: admin
        bypass_mode: always
      - app: id:3648544
        bypass_mode: always
      conditions:
        ref_name:
          include:
          - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: true
          required_review_thread_resolution: true
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
          - context: checks
            app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
- name: SNORE
  spec:
    description: "Parses ResMed CPAP binary data, scores respiratory events against AASM clinical standards, and serves results via CLI, REST API, and Vue web UI"
    topics:
    - python
    - sleep
    - cpap
    # SNORE self-manages its CI (Python + Vue): the single `checks` job is split
    # into `backend` + `ui`, plus a dedicated `e2e` job. Override the default
    # ruleset's required status checks to match the contexts SNORE emits, since
    # the shared default requires a single `checks` context that SNORE no longer
    # reports.
    rulesets:
    - name: main
      target: branch
      enforcement: active
      bypass_actors:
      - role: admin
        bypass_mode: always
      - app: id:3648544
        bypass_mode: always
      conditions:
        ref_name:
          include:
          - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: true
          required_review_thread_resolution: true
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
          - context: backend
            app: github-actions
          - context: ui
            app: github-actions
          - context: e2e
            app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
- name: JamBot
- name: meowdb
  spec:
    description: "Personal cat meow audio library — record, upload, and play back clips via CLI, REST API, and web UI"
    topics:
    - python
    - fastapi
    - sqlite

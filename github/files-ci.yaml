apiVersion: gh-infra/v1
kind: FileSet
metadata:
  owner: wpfleger96

spec:
  repositories:
    - ai-agent-rules
    - claude-code-status-line
    - pagerduty-mcp-server
    - JamBot
    - meowdb
    - name: envsync
      overrides:
        - path: .github/workflows/ci.yml
          vars:
            system_packages: "libsqlcipher-dev"
    - name: recall
      overrides:
        - path: .github/workflows/ci.yml
          vars:
            git_identity: "true"
    - name: shell-configs
      overrides:
        - path: .github/workflows/ci.yml
          vars:
            shell: "true"

  files:
    - path: .github/workflows/ci.yml
      source: ./templates/ci-python.yml

  via: push
  commit_message: "ci: sync CI workflow"

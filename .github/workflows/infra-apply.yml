name: Infra Apply

on:
  push:
    branches: [main]
    paths:
      - "github/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: infra-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install gh-infra (fork with override fix)
        run: |
          git clone --depth 1 -b dev https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra
          cd /tmp/gh-infra && go build -o gh-infra ./cmd/gh-infra/
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Apply infra changes
        run: gh infra apply github/ --auto-approve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

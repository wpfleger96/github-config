name: Infra Drift Detection

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Clone gh-infra
        run: git clone --depth 1 -b dev https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Build and install gh-infra
        run: |
          cd /tmp/gh-infra && go build -o gh-infra ./cmd/gh-infra/
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"

      - name: Detect drift
        run: gh infra plan github/ --ci
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

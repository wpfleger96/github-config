name: Infra Drift Detection

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gh-infra (fork with override fix)
        run: |
          git clone --depth 1 https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra
          cd /tmp/gh-infra && go build -o gh-infra .
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect drift
        run: gh infra plan github/ --ci
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

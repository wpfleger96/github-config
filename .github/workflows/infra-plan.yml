name: Infra Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "github/**"

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Install gh-infra
        run: gh extension install babarot/gh-infra --pin v0.13.0
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Plan infra changes
        run: gh infra plan github/ 2>&1 | tee /tmp/plan-raw.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NO_COLOR: "1"
          TERM: dumb

      - name: Comment plan on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          {
            echo '<!-- infra-plan -->'
            echo '### Infra Plan'
            echo ''
            echo '```'
            sed $'s/\x1b\[[0-9;]*m//g; s/\x1b\]8;;[^\x1b]*\x1b\\\\/\n/g' /tmp/plan-raw.txt | sed 's/\x1b\]8;;[^ ]*//g'
            echo '```'
          } > /tmp/comment-body.md

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- infra-plan -->")) | .id' \
            | head -1)

          if [ -n "$COMMENT_ID" ]; then
            jq -n --rawfile body /tmp/comment-body.md '{body: $body}' | \
              gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments/${COMMENT_ID}" \
                --method PATCH --input -
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment-body.md
          fi

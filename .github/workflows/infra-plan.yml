name: Infra Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "github/**"

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Clone gh-infra
        run: git clone --depth 1 -b dev https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Build and install gh-infra
        run: |
          cd /tmp/gh-infra && go build -o gh-infra ./cmd/gh-infra/
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"

      - name: Plan infra changes
        run: |
          gh infra plan github/ --diff 2>&1 | sed $'s/\x1b\]8;;[^\x07]*\x07//g' | tee /tmp/plan-output.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NO_COLOR: "1"
          TERM: dumb

      - name: Comment plan on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          {
            echo '<!-- infra-plan -->'
            echo '### Infra Plan'
            echo ''
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } > /tmp/comment-body.md

          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- infra-plan -->")) | .id' | \
            while read -r cid; do
              gh api "repos/${{ github.repository }}/issues/comments/${cid}" \
                --method DELETE 2>/dev/null || true
            done

          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment-body.md

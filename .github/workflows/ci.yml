name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone gh-infra
        run: git clone --depth 1 https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Build and install gh-infra
        run: |
          cd /tmp/gh-infra && go build -o gh-infra ./cmd/gh-infra/
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"

      - name: Validate gh-infra manifests
        run: gh infra validate github/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflow templates
        # ci-python.yml excluded: contains gh-infra <% %> template directives that aren't valid YAML
        # release.yml excluded: actionlint#648 — stale @v3 metadata missing client-id input
        run: ./actionlint github/templates/ci-infra.yml github/templates/publish.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}

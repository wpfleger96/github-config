name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gh-infra (fork with override fix)
        run: |
          git clone --depth 1 https://github.com/wpfleger96/gh-infra.git /tmp/gh-infra
          cd /tmp/gh-infra && go build -o gh-infra .
          EXT_DIR="$(gh config get extensions_dir 2>/dev/null || echo "${HOME}/.local/share/gh/extensions")/gh-infra"
          mkdir -p "$EXT_DIR"
          mv gh-infra "$EXT_DIR/gh-infra"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate gh-infra manifests
        run: gh infra validate github/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint workflow templates
        run: ./actionlint github/templates/*.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}
